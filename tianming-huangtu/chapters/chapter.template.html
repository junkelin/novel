<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{CHAPTER_TITLE}} - {{SITE_TITLE}}</title>
  <meta name="description" content="{{CHAPTER_TITLE}} - {{SITE_TITLE}}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e8e8e8;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .chapter-header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
    }
    .chapter-subtitle {
      color: #888;
      font-size: 0.95em;
      margin-bottom: 8px;
    }
    .chapter-title {
      font-size: 2em;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      margin-bottom: 10px;
    }
    .chapter-meta {
      color: #888;
      font-size: 0.9em;
    }
    .chapter-content {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 40px;
      line-height: 2;
      font-size: 1.1em;
      text-align: justify;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }
    .chapter-content p {
      margin-bottom: 1.5em;
      text-indent: 2em;
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      gap: 20px;
    }
    .nav-btn {
      flex: 1;
      padding: 15px 25px;
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 10px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .nav-btn:hover {
      background: rgba(255, 215, 0, 0.2);
      transform: translateY(-3px);
    }
    .nav-btn a {
      color: #ffd700;
      text-decoration: none;
      font-size: 1.1em;
    }
    .nav-btn.disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .back-home {
      text-align: center;
      margin-top: 30px;
    }
    .back-home a {
      color: #888;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .back-home a:hover {
      color: #ffd700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="chapter-header">
      <div class="chapter-subtitle">《{{SITE_TITLE}}》</div>
      <h1 class="chapter-title">{{CHAPTER_TITLE}}</h1>
      <p class="chapter-meta">{{CHAPTER_DATE}}</p>
    </div>

    <div class="chapter-content">
      {{CHAPTER_CONTENT}}
    </div>

    <div class="nav-buttons">
      {{PREV_BTN}}
      {{NEXT_BTN}}
    </div>

    <div class="back-home">
      <a href="../index.html">📖 返回目录</a>
    </div>
  </div>
</body>
</html>
